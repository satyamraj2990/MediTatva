<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Outer circle background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Medical Scooter/Bike -->
  <g transform="translate(100, 95)">
    <!-- Scooter Body (medical theme) -->
    <!-- Side view scooter -->
    
    <!-- Back Wheel -->
    <circle cx="-35" cy="25" r="12" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="-35" cy="25" r="8" fill="none" stroke="white" stroke-width="1.5"/>
    
    <!-- Front Wheel -->
    <circle cx="25" cy="25" r="12" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="25" cy="25" r="8" fill="none" stroke="white" stroke-width="1.5"/>
    
    <!-- Scooter Platform -->
    <rect x="-32" y="19" width="60" height="6" rx="2" fill="white" opacity="0.9"/>
    
    <!-- Scooter Steering Column -->
    <line x1="20" y1="19" x2="20" y2="-8" stroke="white" stroke-width="2"/>
    
    <!-- Handlebar -->
    <path d="M 15 -8 Q 20 -15 25 -8" stroke="white" stroke-width="2.5" fill="none"/>
    
    <!-- Rider/Person -->
    <!-- Head -->
    <circle cx="0" cy="-18" r="5" fill="white" opacity="0.85"/>
    
    <!-- Body -->
    <rect x="-3" y="-12" width="6" height="12" rx="2" fill="white" opacity="0.85"/>
    
    <!-- Arms with Medical Bag -->
    <!-- Left arm -->
    <line x1="-3" y1="-10" x2="-12" y2="-5" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Right arm (holding) -->
    <line x1="3" y1="-10" x2="14" y2="-8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Medical Box/Package Being Carried -->
    <g transform="translate(18, -12)">
      <rect x="0" y="0" width="12" height="10" rx="1" fill="none" stroke="white" stroke-width="1.8" stroke-dasharray="2,2" opacity="0.9"/>
      <!-- Medical Cross on box -->
      <line x1="6" y1="2" x2="6" y2="8" stroke="white" stroke-width="1.2" opacity="0.8"/>
      <line x1="3" y1="5" x2="9" y2="5" stroke="white" stroke-width="1.2" opacity="0.8"/>
    </g>
    
    <!-- Wind elements (speed lines) -->
    <line x1="-45" y1="0" x2="-55" y2="0" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="-45" y1="-5" x2="-58" y2="-5" stroke="white" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    <line x1="-45" y1="5" x2="-52" y2="5" stroke="white" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- Healthcare Accent Elements -->
  <g transform="translate(135, 65)">
    <!-- Small medical cross accent -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="white" stroke-width="1.2"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="white" stroke-width="1.2"/>
  </g>
  
  <!-- Top accent elements (house/building silhouette) -->
  <g transform="translate(65, 55)">
    <!-- Tiny house accent -->
    <path d="M 0 -6 L 6 0 L 6 6 L -6 6 L -6 0 Z" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="6" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="100" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
</svg>