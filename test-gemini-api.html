<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Test - AI Saarthi</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; margin: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:hover { background: #45a049; }
        .test-button { background: #2196F3; }
        .test-button:hover { background: #0b7dda; }
        #output { background: #2a2a2a; padding: 20px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196F3; }
        input { padding: 10px; font-size: 14px; width: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 AI Saarthi - Gemini API Diagnostic Test</h1>
        <p>This page tests your Gemini API configuration for AI Saarthi voice assistant.</p>
        
        <h2>Tests:</h2>
        <button onclick="testAPIKey()">1. Test API Key</button>
        <button onclick="testSafetySettings()" class="test-button">2. Test Safety Settings</button>
        <button onclick="testMedicalQuery()" class="test-button">3. Test Medical Query</button>
        <button onclick="testAllConnections()">4. Run All Tests</button>
        
        <h2>Manual Test:</h2>
        <input type="text" id="userQuery" placeholder="Type a medical question..." value="I have a headache">
        <button onclick="testCustomQuery()">Send Query</button>
        
        <div id="output">Click a test button to start...</div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold } from 'https://esm.run/@google/generative-ai';
        
        const output = document.getElementById('output');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            output.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            console.log(message);
        }
        
        function clear() {
            output.innerHTML = '';
        }
        
        window.testAPIKey = async function() {
            clear();
            log('🔑 Testing API Key...', 'info');
            
            try {
                const apiKey = prompt('Enter your Gemini API Key:', 'AIzaSyREDACTED_KEY');
                if (!apiKey) {
                    log('❌ No API key provided', 'error');
                    return;
                }
                
                log('📝 API Key Length: ' + apiKey.length, 'info');
                log('🔐 API Key (masked): ' + apiKey.substring(0, 10) + '...' + apiKey.substring(apiKey.length - 4), 'info');
                
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: 'gemini-1.5-flash' });
                
                log('✅ API Key valid - Gemini AI initialized', 'success');
                window.testGenAI = genAI;
                window.testAPIKey = apiKey;
                
            } catch (error) {
                log('❌ API Key Error: ' + error.message, 'error');
                log('Stack: ' + error.stack, 'error');
            }
        };
        
        window.testSafetySettings = async function() {
            clear();
            log('🛡️ Testing Safety Settings...', 'info');
            
            if (!window.testGenAI) {
                log('⚠️ Please run Test 1 first to set API key', 'warning');
                return;
            }
            
            try {
                const model = window.testGenAI.getGenerativeModel({
                    model: 'gemini-1.5-flash',
                    safetySettings: [
                        { category: HarmCategory.HARM_CATEGORY_HARASSMENT, threshold: HarmBlockThreshold.BLOCK_NONE },
                        { category: HarmCategory.HARM_CATEGORY_HATE_SPEECH, threshold: HarmBlockThreshold.BLOCK_NONE },
                        { category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT, threshold: HarmBlockThreshold.BLOCK_NONE },
                        { category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT, threshold: HarmBlockThreshold.BLOCK_NONE }
                    ]
                });
                
                log('✅ Model created with BLOCK_NONE settings', 'success');
                
                const chat = model.startChat({
                    history: [
                        { role: 'user', parts: [{ text: 'You are a medical assistant' }] },
                        { role: 'model', parts: [{ text: 'Hello! I am ready to help with medical questions.' }] }
                    ]
                });
                
                log('✅ Chat session started with medical context', 'success');
                window.testChat = chat;
                
            } catch (error) {
                log('❌ Safety Settings Error: ' + error.message, 'error');
                log('Details: ' + JSON.stringify(error, null, 2), 'error');
            }
        };
        
        window.testMedicalQuery = async function() {
            clear();
            log('💊 Testing Medical Query...', 'info');
            
            if (!window.testChat) {
                log('⚠️ Please run Test 2 first to setup chat', 'warning');
                return;
            }
            
            try {
                const query = 'I have a headache. What medicine should I take?';
                log('📤 Sending: ' + query, 'info');
                
                const result = await window.testChat.sendMessage(query);
                log('📥 Response received', 'success');
                
                // Check for blocked response
                const candidate = result.response?.candidates?.[0];
                if (!candidate) {
                    log('❌ No candidate in response', 'error');
                    log('Full response: ' + JSON.stringify(result, null, 2), 'error');
                    return;
                }
                
                if (candidate.finishReason === 'SAFETY') {
                    log('⚠️ Response blocked by safety filters!', 'warning');
                    log('Safety ratings: ' + JSON.stringify(candidate.safetyRatings, null, 2), 'warning');
                    return;
                }
                
                const text = await result.response.text();
                log('✅ Response text extracted successfully', 'success');
                log('📝 Response length: ' + text.length + ' characters', 'info');
                log('\n📋 Full Response:\n' + text, 'success');
                
            } catch (error) {
                log('❌ Query Error: ' + error.message, 'error');
                log('Details: ' + JSON.stringify(error, null, 2), 'error');
            }
        };
        
        window.testCustomQuery = async function() {
            const query = document.getElementById('userQuery').value;
            clear();
            log('🔍 Testing Custom Query...', 'info');
            
            if (!window.testChat) {
                log('⚠️ Please run Test 2 first to setup chat', 'warning');
                return;
            }
            
            try {
                log('📤 Sending: ' + query, 'info');
                
                const result = await window.testChat.sendMessage(query);
                log('📥 Response received', 'success');
                
                const candidate = result.response?.candidates?.[0];
                if (!candidate) {
                    log('❌ No candidate in response', 'error');
                    return;
                }
                
                if (candidate.finishReason === 'SAFETY') {
                    log('⚠️ Response blocked by safety filters!', 'warning');
                    return;
                }
                
                const text = await result.response.text();
                log('✅ Response received', 'success');
                log('\n📋 Response:\n' + text, 'success');
                
            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
            }
        };
        
        window.testAllConnections = async function() {
            clear();
            log('🚀 Running All Tests...', 'info');
            log('═══════════════════════════════════════\n', 'info');
            
            await testAPIKey();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testSafetySettings();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testMedicalQuery();
            
            log('\n═══════════════════════════════════════', 'info');
            log('✅ All tests completed!', 'success');
        };
        
        log('Ready! Click a test button above.', 'info');
    </script>
</body>
</html>
